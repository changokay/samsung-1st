<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼성 × 쿠팡 최저가</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --blue: #1428A0;
    --blue-l: #1a35cc;
    --green: #03C75A;
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1f1f2e;
    --text: #f0f0f5;
    --sub: #8888a0;
    --muted: #4a4a60;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* Header */
  header { background:#0a0a1a; border-bottom:1px solid var(--border); padding:0 32px; position:sticky; top:0; z-index:10; }
  .header-inner { max-width:1200px; margin:0 auto; height:60px; display:flex; align-items:center; justify-content:space-between; }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-samsung { font-size:20px; font-weight:900; }
  .logo-div { width:1px; height:18px; background:#333; }
  .logo-tag { font-size:13px; color:var(--green); font-weight:700; display:flex; align-items:center; gap:5px; }
  .rocket-badge { background:var(--green); color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:3px; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .search-status { font-size:12px; color:var(--sub); }
  .btn-all { background:var(--blue); color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:all 0.2s; }
  .btn-all:hover { background:var(--blue-l); }
  .btn-all:disabled { opacity:0.4; cursor:not-allowed; }

  /* Main */
  main { max-width:1200px; margin:0 auto; padding:32px; }
  .page-title { margin-bottom:24px; }
  .page-title h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
  .page-title p { font-size:13px; color:var(--sub); }

  /* Stats */
  .stats { display:flex; gap:20px; margin-bottom:24px; padding:14px 18px; background:var(--card); border:1px solid var(--border); border-radius:12px; }
  .stat { display:flex; align-items:center; gap:7px; }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dot-gray { background:var(--muted); }
  .dot-green { background:var(--green); }
  .dot-blue { background:var(--blue); }
  .stat-label { font-size:12px; color:var(--sub); }
  .stat-val { font-size:14px; font-weight:700; }

  /* Filters */
  .filters { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .filter-btn { background:var(--card); border:1px solid var(--border); color:var(--sub); padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500; font-family:inherit; cursor:pointer; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

  /* Grid */
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(270px, 1fr)); gap:18px; }

  /* Card */
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; transition:all 0.25s; }
  .card:hover { border-color:#2a2a3e; transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,0.4); }
  .card.found { border-color:rgba(3,199,90,0.3); }

  /* Image */
  .card-img { width:100%; height:180px; background:#1a1a2a; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .card-img img { width:100%; height:100%; object-fit:cover; animation:fadeIn 0.3s; }
  .img-placeholder { font-size:54px; opacity:0.35; }
  .img-loading { position:absolute; inset:0; background:#1a1a2a; display:flex; align-items:center; justify-content:center; }
  .spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* Body */
  .card-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:12px; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .model { font-size:11px; color:var(--muted); font-family:monospace; font-weight:600; letter-spacing:0.5px; margin-bottom:3px; }
  .note { font-size:15px; font-weight:700; line-height:1.4; }

  .cat-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; white-space:nowrap; }
  .cat-티비   { background:rgba(20,40,160,0.25); color:#6b8aff; border:1px solid rgba(20,40,160,0.4); }
  .cat-휴대폰 { background:rgba(3,199,90,0.15);  color:#03C75A; border:1px solid rgba(3,199,90,0.3); }
  .cat-노트북 { background:rgba(180,100,255,0.15); color:#c07aff; border:1px solid rgba(180,100,255,0.3); }
  .cat-태블릿 { background:rgba(255,160,50,0.15); color:#ffb347; border:1px solid rgba(255,160,50,0.3); }
  .cat-모니터 { background:rgba(0,200,220,0.15); color:#00c8dc; border:1px solid rgba(0,200,220,0.3); }

  /* Ref prices */
  .ref-prices { display:flex; gap:14px; }
  .ref-item { display:flex; gap:5px; align-items:center; }
  .ref-label { font-size:10px; color:var(--muted); font-weight:600; }
  .ref-val { font-size:12px; color:var(--sub); }
  .price-range { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Price box */
  .price-box { background:rgba(3,199,90,0.08); border:1px solid rgba(3,199,90,0.2); border-radius:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
  .price-box.searching { background:rgba(20,40,160,0.08); border-color:rgba(20,40,160,0.2); animation:pulse 1.5s infinite; }
  .price-box.error { background:rgba(255,70,70,0.06); border-color:rgba(255,70,70,0.2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .price-label { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--green); }
  .price-right { text-align:right; }
  .price-amount { font-size:18px; font-weight:900; color:var(--green); line-height:1; }
  .price-amount.idle { font-size:12px; font-weight:500; color:var(--muted); }
  .price-amount.loading { font-size:12px; font-weight:600; color:#6b8aff; animation:pulse 1s infinite; }
  .price-amount.err { font-size:11px; color:#ff6b6b; }
  .savings { font-size:10px; font-weight:600; margin-top:2px; }

  /* Buttons */
  .card-btns { display:flex; gap:8px; margin-top:auto; }
  .btn-search { flex:1; background:var(--blue); color:#fff; border:none; padding:10px; border-radius:8px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; transition:background 0.2s; }
  .btn-search:hover { background:var(--blue-l); }
  .btn-search:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-go { background:rgba(3,199,90,0.1); color:var(--green); border:1px solid rgba(3,199,90,0.25); padding:10px 12px; border-radius:8px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; transition:all 0.2s; white-space:nowrap; }
  .btn-go:hover { background:rgba(3,199,90,0.2); }
  .btn-go.hidden { display:none; }

  /* Loading */
  .page-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; gap:16px; color:var(--sub); }
  .big-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }

  footer { text-align:center; margin-top:48px; padding:20px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); line-height:1.8; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-samsung">SAMSUNG</span>
      <div class="logo-div"></div>
      <span class="logo-tag"><span class="rocket-badge">로켓</span>최저가 매칭</span>
    </div>
    <div class="header-right">
      <span class="search-status" id="status">로딩 중...</span>
      <button class="btn-all" id="btnAll" onclick="searchAll()" disabled>↺ 전체 재검색</button>
    </div>
  </div>
</header>

<main>
  <div class="page-title">
    <h1>삼성 제품 쿠팡 로켓배송 최저가</h1>
    <p>s-mn-claude 모델 기준 · 참고가 ±10% 범위 내 로켓배송 최저가 조회</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="dot dot-gray"></div><span class="stat-label">전체</span><span class="stat-val" id="sTotal">-</span></div>
    <div class="stat"><div class="dot dot-green"></div><span class="stat-label">완료</span><span class="stat-val" id="sFound">0</span></div>
    <div class="stat"><div class="dot dot-blue"></div><span class="stat-label">검색 중</span><span class="stat-val" id="sBusy">0</span></div>
  </div>

  <div class="filters" id="filters"></div>

  <div id="content">
    <div class="page-loading"><div class="big-spinner"></div><span>상품 목록 불러오는 중...</span></div>
  </div>
</main>

<footer>
  ※ 참고가 ±10% 범위 내 로켓배송 상품을 조회합니다. 가격은 참고용이며 실제 판매가와 다를 수 있습니다.
</footer>

<script>
const ICONS = { '티비':'📺', '휴대폰':'📱', '노트북':'💻', '태블릿':'⬛', '모니터':'🖥️' };

let products = [];
const state = { results:{}, images:{}, busy: new Set(), filter:'전체' };

/* ── 통계 ── */
function updateStats() {
  document.getElementById('sTotal').textContent = products.length;
  document.getElementById('sFound').textContent = Object.keys(state.results).length;
  document.getElementById('sBusy').textContent  = state.busy.size;
}

/* ── 필터 ── */
function buildFilters() {
  const cats = ['전체', ...new Set(products.map(p => p.category))];
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${c==='전체'?' active':''}" onclick="applyFilter('${c}')">${c}</button>`
  ).join('');
}
function applyFilter(cat) {
  state.filter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  document.querySelectorAll('.card').forEach(c => c.style.display = (cat==='전체'||c.dataset.cat===cat)?'':'none');
}

/* ── 카드 렌더 ── */
function renderCard(p) {
  const r   = state.results[p.model];
  const img = state.images[p.model];
  const busy = state.busy.has(p.model);

  // 이미지
  const imgHtml = img
    ? `<img src="${img}" alt="${p.note}" onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>${ICONS[p.category]||'📦'}</span>'">`
    : `<span class="img-placeholder">${ICONS[p.category]||'📦'}</span>`;

  // 가격 박스
  let priceBox;
  if (busy) {
    priceBox = `<div class="price-box searching">
      <div class="price-label">🚀 로켓배송</div>
      <div class="price-right"><div class="price-amount loading">검색 중...</div></div>
    </div>`;
  } else if (r?.cheapest) {
    const { price, url } = r.cheapest;
    const ref  = p.coupangRef;
    const diff = ref ? ref - price : null;
    const sign = diff > 0 ? `▼ ${diff.toLocaleString()}원 저렴` : diff < 0 ? `▲ ${Math.abs(diff).toLocaleString()}원 비쌈` : '동일가';
    const col  = diff > 0 ? 'var(--green)' : diff < 0 ? '#ff6b6b' : 'var(--muted)';
    priceBox = `<div class="price-box">
      <div class="price-label">🚀 로켓 최저가</div>
      <div class="price-right">
        <div class="price-amount">${price.toLocaleString()}<span style="font-size:11px;font-weight:500">원</span></div>
        ${ref ? `<div class="savings" style="color:${col}">${sign}</div>` : ''}
      </div>
    </div>`;
  } else if (r && !r.cheapest) {
    priceBox = `<div class="price-box error">
      <div class="price-label" style="color:#ff6b6b">⚠️ 검색 결과 없음</div>
      <div class="price-right"><div class="price-amount err">결과 없음</div></div>
    </div>`;
  } else {
    priceBox = `<div class="price-box">
      <div class="price-label">🚀 로켓배송</div>
      <div class="price-right"><div class="price-amount idle">미조회</div></div>
    </div>`;
  }

  const linkUrl = r?.cheapest?.url || '';
  const rangeText = p.coupangRef
    ? `검색 범위: ${Math.round(p.coupangRef*0.7).toLocaleString()}원 ~ ${Math.round(p.coupangRef*1.3).toLocaleString()}원`
    : '';

  return `
  <div class="card${r?.cheapest?' found':''}" id="card-${p.id}" data-cat="${p.category}">
    <div class="card-img" id="img-${p.id}">
      ${busy && !img ? '<div class="img-loading"><div class="spinner"></div></div>' : imgHtml}
    </div>
    <div class="card-body">
      <div class="card-top">
        <div><div class="model">${p.model}</div><div class="note">${p.note}</div></div>
        <span class="cat-badge cat-${p.category}">${p.category}</span>
      </div>
      <div>
        <div class="ref-prices">
          ${p.coupangRef ? `<div class="ref-item"><span class="ref-label">쿠팡 참고가</span><span class="ref-val">${p.coupangRef.toLocaleString()}원</span></div>` : ''}
          ${p.naverRef   ? `<div class="ref-item"><span class="ref-label">네이버</span><span class="ref-val">${p.naverRef.toLocaleString()}원</span></div>` : ''}
        </div>
        ${rangeText ? `<div class="price-range">${rangeText}</div>` : ''}
      </div>
      ${priceBox}
      <div class="card-btns">
        <button class="btn-search" onclick="searchOne('${p.model}')" ${busy?'disabled':''}>🔍 최저가 검색</button>
        <a class="btn-go${linkUrl?'':' hidden'}" href="${linkUrl}" target="_blank" rel="noopener">구매 →</a>
      </div>
    </div>
  </div>`;
}

function renderGrid() {
  document.getElementById('content').innerHTML = `<div class="grid">${products.map(renderCard).join('')}</div>`;
  applyFilter(state.filter);
  updateStats();
}

/* ── 카드 업데이트 ── */
function updateCard(p) {
  const el = document.getElementById(`card-${p.id}`);
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderCard(p);
  const newCard = tmp.firstElementChild;

  // 이미지 유지
  if (state.images[p.model]) {
    const imgEl = newCard.querySelector(`#img-${p.id}`);
    if (imgEl) imgEl.innerHTML = `<img src="${state.images[p.model]}" alt="${p.note}"
      onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>${ICONS[p.category]||'📦'}</span>'">`;
  }
  el.replaceWith(newCard);
  applyFilter(state.filter);
  updateStats();
}

/* ── 단일 검색 ── */
async function searchOne(model) {
  const p = products.find(x => x.model === model);
  if (!p || state.busy.has(model)) return;

  state.busy.add(model);
  updateCard(p);

  try {
    const res  = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, keyword: '삼성 ' + p.note, refPrice: p.coupangRef || p.naverRef })
    });
    const data = await res.json();
    state.results[model] = data;

    // 서버에서 받은 이미지 URL 바로 사용 (Bing에서 최저가 상품명으로 검색)
    if (data.image) {
      state.images[p.model] = data.image;
      const el = document.getElementById(`img-${p.id}`);
      if (el) el.innerHTML = `<img src="${data.image}" alt="${p.note}" style="animation:fadeIn 0.4s"
        onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>${ICONS[p.category]||'📦'}</span>'">`;
    }
  } catch (e) {
    state.results[model] = { success: false, error: e.message };
  } finally {
    state.busy.delete(model);
    updateCard(p);
  }
}

/* ── 이미지 로드 ── */
async function loadThumb(p, url) {
  try {
    const res  = await fetch(`/api/thumbnail?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if (data.image) {
      state.images[p.model] = data.image;
      const el = document.getElementById(`img-${p.id}`);
      if (el) el.innerHTML = `<img src="${data.image}" alt="${p.note}" style="animation:fadeIn 0.3s"
        onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>${ICONS[p.category]||'📦'}</span>'">`;
    }
  } catch {}
}

/* ── 전체 검색 ── */
let allRunning = false;
async function searchAll() {
  if (allRunning) return;
  allRunning = true;
  const btn = document.getElementById('btnAll');
  btn.disabled = true;

  const todo = products.filter(p => !state.busy.has(p.model));
  const BATCH = 3;
  for (let i = 0; i < todo.length; i += BATCH) {
    document.getElementById('status').textContent = `검색 중 ${Math.min(i+BATCH, todo.length)} / ${todo.length}`;
    await Promise.all(todo.slice(i, i+BATCH).map(p => searchOne(p.model)));
  }

  document.getElementById('status').textContent = `완료 (${Object.keys(state.results).length}/${products.length})`;
  btn.disabled = false;
  allRunning = false;
}

/* ── 초기화 ── */
async function init() {
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();
    products   = Array.isArray(data) ? data : (data.products || []);

    document.getElementById('content').innerHTML = `<div class="grid"></div>`;
    buildFilters();
    renderGrid();
    document.getElementById('btnAll').disabled = false;

    // 페이지 로드 후 자동으로 전체 검색 시작 (이미지 + 가격 동시 표시)
    searchAll();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="page-loading" style="color:#ff6b6b">로드 실패: ${e.message}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
